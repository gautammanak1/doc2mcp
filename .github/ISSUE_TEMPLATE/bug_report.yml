name: Bug report
description: Report something that is broken or not working as expected.
title: "fix: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps so we can reproduce it.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Where did this happen?
      options:
        - Production (doc2mcp.site)
        - Vercel preview deployment
        - Local development
        - Self-hosted
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Logs, screenshots, or extra context
      description: Paste any relevant logs or screenshots. Do NOT include secrets or tokens.
