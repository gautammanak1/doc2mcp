name: Deploy Preview

# Builds a Vercel *preview* deployment for every pull request and posts the
# URL back on the PR. This gives reviewers a live preview without needing a
# Vercel team/GitHub-integration, since the repo-level Vercel secrets are used
# directly. Production stays tag-gated (deploy-production.yml) and staging
# still deploys on push to `staging` (deploy-staging.yml).
on:
  pull_request:
    branches: [staging, main, master]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  preview:
    name: Vercel preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt preview
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview: $url"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vercel-preview
          message: |
            **Vercel preview ready**

            Branch `${{ github.event.pull_request.head.ref }}` deployed as a Vercel preview:

            ${{ steps.deploy.outputs.url }}
