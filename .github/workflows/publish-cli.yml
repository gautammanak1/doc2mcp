name: Publish CLI

# Publishes the `doc2mcp` npm package whenever the CLI changes on the default
# branch. The job is version-gated: it only runs `npm publish` when the version
# in cli/package.json is NOT already on npm, so re-pushing the same version is a
# no-op. To ship an update: bump the version in cli/package.json and push.
on:
  push:
    branches: [main, master]
    paths:
      - "cli/**"
  workflow_dispatch:

concurrency:
  group: publish-cli
  cancel-in-progress: false

permissions:
  contents: read

env:
  PNPM_VERSION: 10.32.1
  NODE_VERSION: 20

jobs:
  publish:
    name: Build + publish doc2mcp
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check whether this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm — skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.published == 'false'
        run: pnpm build

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: steps.check.outputs.published == 'false'
        run: echo "::notice::Published ${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }} to npm."
