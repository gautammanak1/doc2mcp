name: CI

on:
  push:
    branches: [main, master, staging]
  pull_request:
    branches: [main, master, staging]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin once for all jobs
  NODE_VERSION: 20
  PNPM_VERSION: 10.32.1

jobs:
  install:
    name: Install + cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

  typecheck:
    name: TypeScript
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm exec tsc --noEmit --skipLibCheck

  lint:
    name: Biome + Ultracite
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ultracite check
        run: pnpm check

  security:
    name: Dependency + secret scan
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Trivy: known-CVE scan over the lockfile. Fails the job on HIGH/CRITICAL
      # so a Dependabot bump or a malicious transitive can't slip through.
      #
      # The official trivy-action README recommends pinning to `@master`; per-
      # minor tags such as `0.28.0` are not always published, which was
      # breaking CI ("Unable to resolve action").
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
      # gitleaks: catches accidentally-committed API keys before they hit
      # main. Configured to ignore the .env.example placeholder values.
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cli:
    name: CLI build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install --frozen-lockfile
      - name: Build CLI
        run: pnpm build

  build:
    name: Next build (no migrate)
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Build needs these to type-resolve; values can be dummies for CI build.
      AUTH_SECRET: ci-secret-not-used-at-runtime
      GEMINI_API_KEY: ci-key
      POSTGRES_URL: postgres://user:pass@localhost:5432/ci
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon
      SUPABASE_SERVICE_ROLE_KEY: ci-service
      SKIP_MIGRATE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Next build
        run: pnpm exec next build
