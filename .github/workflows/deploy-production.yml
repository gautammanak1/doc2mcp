name: Deploy Production

# Production deploys are gated behind version tags only. Pushing to `main`
# does NOT deploy (see vercel.json -> git.deploymentEnabled.main = false).
# Promote a release by tagging a merged commit on main:
#   git tag v1.4.0 && git push origin v1.4.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Vercel production (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
