<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470" role="img" aria-label="Sequence of an agent calling the MCP endpoint, which queries the retrieval layer and Postgres, then returns cited results" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="s-ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a78bfa"/></marker>
    <marker id="s-arc" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22d3ee"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="1079" height="469" rx="18" fill="#0a0a0f" stroke="#1d1d28"/>
  <text x="32" y="40" fill="#e5e7eb" font-size="16" font-weight="600">Agent query sequence</text>
  <text x="32" y="60" fill="#8b8b9a" font-size="12">A single tools/call from request to cited response</text>

  <!-- lifelines -->
  <g stroke="#26263300" >
    <line x1="150" y1="116" x2="150" y2="430" stroke="#26263a" stroke-width="1.5" stroke-dasharray="3 5"/>
    <line x1="410" y1="116" x2="410" y2="430" stroke="#26263a" stroke-width="1.5" stroke-dasharray="3 5"/>
    <line x1="680" y1="116" x2="680" y2="430" stroke="#26263a" stroke-width="1.5" stroke-dasharray="3 5"/>
    <line x1="940" y1="116" x2="940" y2="430" stroke="#26263a" stroke-width="1.5" stroke-dasharray="3 5"/>
  </g>

  <!-- headers -->
  <g>
    <rect x="80" y="80" width="140" height="36" rx="9" fill="#13131b" stroke="#2a2a38"/>
    <text x="150" y="103" fill="#f3f4f6" font-size="12" font-weight="600" text-anchor="middle">AI Agent</text>
    <rect x="338" y="80" width="144" height="36" rx="9" fill="#13131b" stroke="#2a2a38"/>
    <text x="410" y="103" fill="#f3f4f6" font-size="12" font-weight="600" text-anchor="middle">MCP Endpoint</text>
    <rect x="606" y="80" width="148" height="36" rx="9" fill="#13131b" stroke="#2a2a38"/>
    <text x="680" y="103" fill="#f3f4f6" font-size="12" font-weight="600" text-anchor="middle">Retrieval Layer</text>
    <rect x="876" y="80" width="128" height="36" rx="9" fill="#13131b" stroke="#2a2a38"/>
    <text x="940" y="103" fill="#f3f4f6" font-size="12" font-weight="600" text-anchor="middle">Postgres</text>
  </g>

  <!-- messages -->
  <g font-size="11">
    <text x="156" y="150" fill="#cbd5e1">tools/call → search_documentation(query)</text>
    <line x1="150" y1="158" x2="408" y2="158" stroke="#a78bfa" stroke-width="2" marker-end="url(#s-ar)"/>

    <text x="416" y="194" fill="#cbd5e1">verify Bearer token → build query</text>
    <line x1="410" y1="202" x2="678" y2="202" stroke="#a78bfa" stroke-width="2" marker-end="url(#s-ar)"/>

    <text x="686" y="238" fill="#cbd5e1">heading-aware section lookup</text>
    <line x1="680" y1="246" x2="938" y2="246" stroke="#a78bfa" stroke-width="2" marker-end="url(#s-ar)"/>

    <text x="686" y="284" fill="#7dd3fc">matching chunks + breadcrumbs</text>
    <line x1="940" y1="292" x2="682" y2="292" stroke="#22d3ee" stroke-width="2" marker-end="url(#s-arc)"/>

    <text x="416" y="330" fill="#7dd3fc">ranked sections + source URLs</text>
    <line x1="680" y1="338" x2="412" y2="338" stroke="#22d3ee" stroke-width="2" marker-end="url(#s-arc)"/>

    <text x="156" y="376" fill="#7dd3fc">JSON-RPC result → cited answer</text>
    <line x1="410" y1="384" x2="152" y2="384" stroke="#22d3ee" stroke-width="2" marker-end="url(#s-arc)"/>
  </g>
</svg>
