<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="250" viewBox="0 0 1080 250" role="img" aria-label="Conversion lifecycle states: pending, crawling, analyzing, generating, then ready or error" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="l-ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"/></marker>
    <marker id="l-err" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="1079" height="249" rx="18" fill="#0a0a0f" stroke="#1d1d28"/>
  <text x="32" y="40" fill="#e5e7eb" font-size="16" font-weight="600">Conversion lifecycle</text>
  <text x="32" y="60" fill="#8b8b9a" font-size="12">The status field drives the convert page UI and is persisted on every transition</text>

  <g font-size="12" font-weight="600" text-anchor="middle">
    <g><rect x="40" y="92" width="120" height="48" rx="11" fill="#13131b" stroke="#3b3b4a"/><text x="100" y="121" fill="#cbd5e1">pending</text></g>
    <g><rect x="212" y="92" width="120" height="48" rx="11" fill="#161427" stroke="#6d28d9"/><text x="272" y="121" fill="#ddd6fe">crawling</text></g>
    <g><rect x="384" y="92" width="120" height="48" rx="11" fill="#161427" stroke="#6d28d9"/><text x="444" y="121" fill="#ddd6fe">analyzing</text></g>
    <g><rect x="556" y="92" width="120" height="48" rx="11" fill="#161427" stroke="#6d28d9"/><text x="616" y="121" fill="#ddd6fe">generating</text></g>
    <g><rect x="760" y="92" width="120" height="48" rx="11" fill="#0f1f17" stroke="#10b981"/><text x="820" y="121" fill="#6ee7b7">ready</text></g>
    <g><rect x="556" y="184" width="120" height="44" rx="11" fill="#1f1212" stroke="#ef4444"/><text x="616" y="211" fill="#fca5a5">error</text></g>
  </g>

  <g font-size="10" fill="#8b8b9a" text-anchor="middle">
    <text x="186" y="106">start</text>
    <text x="358" y="106">pages fetched</text>
    <text x="530" y="106">AI returns</text>
    <text x="718" y="106">artifacts written</text>
  </g>

  <g>
    <line x1="160" y1="116" x2="210" y2="116" stroke="#6366f1" stroke-width="2" marker-end="url(#l-ar)"/>
    <line x1="332" y1="116" x2="382" y2="116" stroke="#6366f1" stroke-width="2" marker-end="url(#l-ar)"/>
    <line x1="504" y1="116" x2="554" y2="116" stroke="#6366f1" stroke-width="2" marker-end="url(#l-ar)"/>
    <line x1="676" y1="116" x2="758" y2="116" stroke="#6366f1" stroke-width="2" marker-end="url(#l-ar)"/>
    <!-- error transitions -->
    <line x1="616" y1="140" x2="616" y2="182" stroke="#ef4444" stroke-width="1.8" marker-end="url(#l-err)"/>
    <path d="M272,140 C272,206 430,206 554,206" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4 4" marker-end="url(#l-err)"/>
    <text x="392" y="222" fill="#b91c1c" font-size="10" text-anchor="middle">0 pages / crawler error</text>
  </g>
</svg>
