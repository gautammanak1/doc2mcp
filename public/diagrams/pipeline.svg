<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 260" role="img" aria-label="The doc2mcp pipeline: Documentation to Crawling to Knowledge Processing to Retrieval to MCP Generation to AI Agents" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b5b6e"/>
    </marker>
  </defs>
  <rect x="0.5" y="0.5" width="1279" height="259" rx="18" fill="#0a0a0f" stroke="#1d1d28"/>
  <text x="32" y="40" fill="#e5e7eb" font-size="16" font-weight="600">The doc2mcp pipeline</text>
  <text x="32" y="60" fill="#8b8b9a" font-size="12">Documentation infrastructure for AI agents  not just an MCP generator</text>

  <g>
    <!-- nodes -->
    <g transform="translate(40,96)">
      <rect width="170" height="104" rx="14" fill="#13131b" stroke="#2a2a38"/>
      <circle cx="28" cy="34" r="13" fill="#1c1c28" stroke="url(#accent)"/>
      <text x="85" y="55" fill="#f3f4f6" font-size="14" font-weight="600" text-anchor="middle">Documentation</text>
      <text x="85" y="76" fill="#8b8b9a" font-size="11" text-anchor="middle">Any docs URL</text>
    </g>
    <g transform="translate(238,96)">
      <rect width="170" height="104" rx="14" fill="#13131b" stroke="#2a2a38"/>
      <circle cx="28" cy="34" r="13" fill="#1c1c28" stroke="url(#accent)"/>
      <text x="85" y="55" fill="#f3f4f6" font-size="14" font-weight="600" text-anchor="middle">Crawling</text>
      <text x="85" y="76" fill="#8b8b9a" font-size="11" text-anchor="middle">Fetch + preserve</text>
    </g>
    <g transform="translate(436,96)">
      <rect width="170" height="104" rx="14" fill="#13131b" stroke="#2a2a38"/>
      <circle cx="28" cy="34" r="13" fill="#1c1c28" stroke="url(#accent)"/>
      <text x="85" y="50" fill="#f3f4f6" font-size="14" font-weight="600" text-anchor="middle">Knowledge</text>
      <text x="85" y="68" fill="#f3f4f6" font-size="14" font-weight="600" text-anchor="middle">Processing</text>
      <text x="85" y="88" fill="#8b8b9a" font-size="11" text-anchor="middle">Chunk + index</text>
    </g>
    <g transform="translate(634,96)">
      <rect width="170" height="104" rx="14" fill="#13131b" stroke="#2a2a38"/>
      <circle cx="28" cy="34" r="13" fill="#1c1c28" stroke="url(#accent)"/>
      <text x="85" y="55" fill="#f3f4f6" font-size="14" font-weight="600" text-anchor="middle">Retrieval</text>
      <text x="85" y="76" fill="#8b8b9a" font-size="11" text-anchor="middle">Ranked sections</text>
    </g>
    <g transform="translate(832,96)">
      <rect width="170" height="104" rx="14" fill="#13131b" stroke="#2a2a38"/>
      <circle cx="28" cy="34" r="13" fill="#1c1c28" stroke="url(#accent)"/>
      <text x="85" y="50" fill="#f3f4f6" font-size="14" font-weight="600" text-anchor="middle">MCP</text>
      <text x="85" y="68" fill="#f3f4f6" font-size="14" font-weight="600" text-anchor="middle">Generation</text>
      <text x="85" y="88" fill="#8b8b9a" font-size="11" text-anchor="middle">Hosted endpoint</text>
    </g>
    <g transform="translate(1030,96)">
      <rect width="170" height="104" rx="14" fill="#13131b" stroke="#2a2a38"/>
      <circle cx="28" cy="34" r="13" fill="#1c1c28" stroke="url(#accent)"/>
      <text x="85" y="55" fill="#f3f4f6" font-size="14" font-weight="600" text-anchor="middle">AI Agents</text>
      <text x="85" y="76" fill="#8b8b9a" font-size="11" text-anchor="middle">Cursor À Claude</text>
    </g>

    <!-- arrows -->
    <line x1="212" y1="148" x2="236" y2="148" stroke="#5b5b6e" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="410" y1="148" x2="434" y2="148" stroke="#5b5b6e" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="608" y1="148" x2="632" y2="148" stroke="#5b5b6e" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="806" y1="148" x2="830" y2="148" stroke="#5b5b6e" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="1004" y1="148" x2="1028" y2="148" stroke="#5b5b6e" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
